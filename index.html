<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="logo-ponto.png" type="image/x-icon">
    <title>Ofertas PontoMax</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #FF6B6B; --secondary: #FF6B6B; --dark: #292F36; --light: #F7FFF7; --accent: #FFE66D; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-decoration: none; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: linear-gradient(135deg, #2b0000 0%, #b30000 50%, #ff1a1a 100%); color: var(--light); min-height: 100vh; position: relative; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; position: relative; }
        .logo-container { display: flex; justify-content: center; margin-bottom: 15px; }
        .logo-img { max-width: 300px; height: auto; object-fit: contain; }
        .tag-line { font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px; }
        
        .selection-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 30px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2); }
        .selection-title { text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: var(--accent); }
        .city-buttons, .category-buttons { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 1rem; box-shadow: 0 4px 6px 6px rgba(0, 0, 0, 0.1); width: 250px; }
        .city { background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid rgba(255, 255, 255, 0.4); width: 300px; }
        .city:hover, .city.active { background: var(--primary); border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); }
        .category { background: rgba(255, 255, 255, 0.1); color: white; border: 2px solid rgba(255, 255, 255, 0.3); }
        .category:hover, .category.active { background: var(--secondary); border-color: var(--secondary); transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); }
        .btn.selected { background-color: rgb(238, 67, 67); color: rgb(255, 255, 255); }
        
        .offers-title { text-align: center; margin-bottom: 30px; font-size: 1.8rem; color: var(--accent); }
        
        /* NOVO: Grid ajustado para lado a lado no desktop */
        #offers { margin-top: 30px; width: 100%; }
        #offer-images { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; justify-items: center; }
        
        /* Container que substitui a antiga tag <a> */
        .offer-wrapper { width: 100%; display: flex; justify-content: center; }
        
        #offer-images img { width: 100%; max-width: 450px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); transition: transform 0.3s; object-fit: contain; }
        #offer-images img:hover { transform: scale(1.02); }
        
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 50px; padding-bottom: 30px; }
        .social-link { display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); color: white; font-size: 1.5rem; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .social-link:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2); }
        .facebook:hover { background: #3b5998; } .instagram:hover { background: #e4405f; } .whatsapp:hover { background: #25d366; }
        
        .content { text-align: center; display: block; margin-top: 15px; }
        .ven { background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid rgba(255, 255, 255, 0.4); width: 300px; padding: 12px 25px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 0.80rem; box-shadow: 0 4px 6px 6px rgba(0, 0, 0, 0.1); width: 147px; text-align: center; justify-content: center; margin-top: 10px; }
        .ven:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); }
        
        /* Retorna empilhado no mobile */
        @media (max-width: 768px) {
            .logo-img { max-width: 250px; }
            .city-buttons, .category-buttons { flex-direction: column; align-items: center; }
            .selection-panel { padding: 20px; }
            .btn { padding: 10px 20px; font-size: 0.9rem; width: 280px; }
            .offers-title { font-size: 1.5rem; }
            #offer-images { grid-template-columns: 1fr; } 
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo_pontomax_v3.png" alt="Logo Super Ofertas" class="logo-img">
            </div>
            <p class="tagline" style="font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px;">Ofertas imperdíveis para economizar de verdade!</p>
            <a href="vendedores.html"><button class="ven"><i class="fas fa-user-tie"></i> VENDEDORES </button></a>
        </header>
        <div class="content">
        <div class="selection-panel">
            <h2 class="selection-title"> <i class="fas fa-map-marker-alt"></i> ESCOLHA SUA CIDADE</h2>
            <div class="city-buttons">
                <button id="balsas" class="btn city" onclick="selectCity('balsas')"> <i class="fas fa-store"></i> BALSAS</button>
                <button id="fortaleza" class="btn city" onclick="selectCity('fortaleza')"> <i class="fas fa-store"></i> FORTALEZA DOS NOGUEIRAS</button>
            </div>
            
            <h2 class="selection-title"> <i class="fas fa-tags"></i> ESCOLHA A CATEGORIA</h2>
            <div class="category-buttons">
                <button id="supermercado" class="btn category" onclick="selectCategory('supermercado')"> <i class="fas fa-shopping-cart"></i> Supermercado</button>
                <button id="bazar" class="btn category" onclick="selectCategory('bazar')"> <i class="fas fa-shopping-bag"></i> Bazar</button>
                <button id="eletro" class="btn category" onclick="selectCategory('eletro')"> <i class="fas fa-plug"></i> Eletro</button>
                <button id="site" class="btn category" onclick="selectCategory('site')"> <i class="fas fa-laptop"></i> Site</button>
            </div>
        </div>
        
        <div id="offers">
            <h2 class="offers-title" id="offers-title">Aqui tem oferta de verdade🛒🔥!</h2>
            <div id="offer-images"></div>
        </div>
        
        <div class="social-links">
            <a href="https://www.facebook.com/lojaspontomax/?locale=pt_BR" class="social-link facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/grupopontomax/" class="social-link instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-link whatsapp"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
    </div>

    <script>
        const SB_URL = "https://lfxwieekydjhhkiqqnhf.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeHdpZWVreWRqaGhraXFxbmhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjIzNzAsImV4cCI6MjA5MzczODM3MH0.ftLV2m4qiEm7sDWqb0gQzwRZ4iUwnMU5anlZbUp4wJE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY, {
            global: { fetch: (url, options) => fetch(url, { ...options, cache: 'no-store' }) }
        });

        let allOffers = [];
        let selectedCity = '';
        let selectedCategory = '';

        async function fetchOffers() {
            const { data, error } = await supabaseClient.from('encartes').select('*');
            if (!error && data) {
                allOffers = data;
                updateOffers();
            } else {
                console.error("Erro ao buscar ofertas:", error);
            }
        }

        function selectCity(city) {
            selectedCity = city;
            document.querySelectorAll('.city').forEach(button => button.classList.remove('selected'));
            document.getElementById(city).classList.add('selected');
            updateOffers();
        }

        function selectCategory(category) {
            selectedCategory = category;
            document.querySelectorAll('.category').forEach(button => button.classList.remove('selected'));
            document.getElementById(category).classList.add('selected');
            updateOffers();
        }

        function updateOffers() {
            if (!selectedCity || !selectedCategory) return;

            const offerImages = document.getElementById('offer-images');
            offerImages.innerHTML = ''; 

            const mapCities = {
                'balsas': 'Balsas - MA',
                'fortaleza': 'Fortaleza dos Nogueiras - MA'
            };
            const mapCategories = {
                'supermercado': 'mercado', 
                'bazar': 'bazar',
                'eletro': 'eletro',
                'site': 'site'
            };

            const targetCity = mapCities[selectedCity];
            const targetCategory = mapCategories[selectedCategory];
            const now = new Date();

            const validOffers = allOffers.filter(item => {
                if (item.categoria !== targetCategory) return false;
                if (item.cidades && !item.cidades.includes(targetCity)) return false;

                const dataInicio = new Date(item.data_inicio + 'T00:00:00');
                const gatilho = new Date(dataInicio);
                gatilho.setDate(gatilho.getDate() - 1);
                gatilho.setHours(19, 0, 0, 0);

                const dataFim = new Date(item.data_fim + 'T23:59:59');

                return (now >= gatilho && now <= dataFim);
            });

            if (validOffers.length === 0) {
                offerImages.innerHTML = '<p style="color: white; opacity: 0.8; font-weight: bold; margin-top: 15px;">Nenhuma oferta vigente para esta seleção no momento.</p>';
                return;
            }

            validOffers.forEach(offer => {
                // Cria um container (div) no lugar do antigo link (a)
                const wrapper = document.createElement('div');
                wrapper.className = 'offer-wrapper';
                
                const img = document.createElement('img');
                img.alt = 'Oferta';
                
                // Técnica Blob: Faz o download da imagem em segundo plano e oculta a URL do Supabase
                fetch(offer.url_imagem)
                    .then(res => res.blob())
                    .then(blob => {
                        img.src = URL.createObjectURL(blob);
                    })
                    .catch(() => {
                        // Fallback caso a técnica Blob sofra algum bloqueio de rede no celular do cliente
                        img.src = offer.url_imagem;
                    });
                
                wrapper.appendChild(img);
                offerImages.appendChild(wrapper);
            });
        }

        fetchOffers();
    </script>
</body>
</html>
